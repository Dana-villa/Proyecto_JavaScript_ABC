<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/escudo.webp" type="image/webp">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/cursos.css">
    <title>Instituto ABC | Catálogo de Cursos</title>
</head>
<body>
    <!-- Sidebar -->
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-bg"></div>
            <div class="sidebar-content">

                <div class="sidebar-header">
                    <a href="catalogo-cursos.html"><img src="../images/escudo.webp" alt="Escudo ABC" class="sidebar-escudo"></a>
                </div>

                <nav class="sidebar-menu">
                    <ul>
                        <li class="menu-item active" data-path="dashboard">
                            <a href="catalogo-cursos.html" class="menu-link">
                                <img src="../images/dashboard.webp" alt="" class="menu-icon">
                                <span>Catálogo de Cursos</span>
                            </a>
                        </li>
                        <li class="menu-item" data-path="cursos">
                            <a href="gestion-cursos.html" class="menu-link">
                                <img src="../images/gestioncursos.webp" alt="Gestión de Cursos" class="menu-icon">
                                <span>Gestión de Cursos</span>
                            </a>
                        </li>
                        <li class="menu-item" data-path="docentes">
                            <a href="gestion-docentes.html" class="menu-link">
                                <img src="../images/gestiondocentes.webp" alt="Gestión de Docentes" class="menu-icon">
                                <span>Gestión de Docentes</span>
                            </a>
                        </li>
                        <li class="menu-item" data-path="admin">
                            <a href="modulo-admin.html" class="menu-link">
                                <img src="../images/administrador.webp" alt="Módulo Administrador" class="menu-icon">
                                <span>Módulo Administrador</span>
                            </a>
                        </li>
                    </ul>
                </nav>

                <div class="sidebar-footer">
                    <div class="cerrar-sesion">
                        <a href="" class="menu-link">
                            <img src="../images/sesion.webp" alt="Cerrar Sesión" class="menu-icon">
                            <span>Cerrar Sesión</span>
                        </a>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- contenido principal de la página -->
    <main>
        <h1 class="titulo">Catálogo de Cursos</h1>
        <section class="buscador">
            <input type="text" placeholder="Buscar cursos..." aria-label="Buscar cursos"class="search-input">
        </section>

        <!-- Tarjetas de cursos -->
        <section class="grid-cursos"></section>
            <div id="modal" class="modal hidden">
                <div class="contenido-modal">
                    <span class="close-modal">&times;</span>
                    <img id="modal-banner" src="" alt="Banner del curso">
                    <h2 id="modal-title"></h2>
                    <p id="modal-description"></p>
                    <div id="modal-lessons"></div>
                </div>
            </div>
    </main>
    <script src="../js/modal.js"></script>
    <footer class="footer">
        <p>Hecho con ❤️ por <a href="https://github.com/dana-villa" target="_blank">Dana Villamizar</a>, <a href="https://github.com/sixthdam" target="_blank">Karina Méndez</a> y <a href="https://github.com/Shiroses" target="_blank"> Santiago Domínguez.</a>
        </p>
    </footer>
</body>
<script src="../js/dashboard.js"></script>

</html>
