<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instutición Educativa - ABC</title>
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="./styles/loginPage.css">
</head>
<body>
     <div class="container">
        <!-- Columna izquierda -->
         <div class="left-column">
            <img src="./images/escudo.png" alt="Logo ABC" class="logo">
            <img src="./images/ilustracion3.png" alt="Ilustración educativa" class="additional-illustration">
        </div>

        <!-- Columna derecha -->
        <div class="right-column">
            <div class="login-card">
                <h2>Bienvenidos de nuevo</h2>
                <form>
                    <!-- Campo de correo electrónico -->
                    <div class="input-icon">
                        <label for="email">Correo electrónico</label>
                        <input type="text" id="email" placeholder="Correo electrónico">
                        <i class="icon-email" style="background-image: url(./images/correo.png);"></i>
                    </div>

                    <!-- Campo de contraseña -->
                    <div class="input-icon">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Contraseña">
                        <i class="icon-password" style="background-image: url(./images/contra.png);"></i>
                        <i class="icon-eye" style="background-image: url(./images/ojo.webp);"></i> <!-- Ícono para mostrar/ocultar contraseña -->
                    </div>

                    <!-- Botón de inicio de sesión -->
                    <button type="submit">Iniciar Sesión</button>

                    <!-- Enlaces de ayuda -->
                    <div class="help-links">
                        <a href="#">¿Olvidó su contraseña?</a><br>
                        <a href="#">¿No tiene una cuenta? Regístrate</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Enlace al archivo JavaScript externo -->
    <script src="./scripts/loginPage.js"></script>
</body>
</html>
